model_name: Qwen/Qwen2-0.5B
dataset: data/d2_contrastive/train.jsonl
val_dataset: data/d2_contrastive/val.jsonl
output_dir: models/target
lora_r: 16
lora_alpha: 32
lora_target_modules: ["q_proj", "v_proj"]
num_train_epochs: 3
per_device_train_batch_size: 8
learning_rate: 0.0001
loss_type: triplet
triplet_margin: 0.3
lm_loss_weight: 0.5
fp16: true
max_seq_length: 256
logging_steps: 50
save_strategy: epoch
pool_method: last
